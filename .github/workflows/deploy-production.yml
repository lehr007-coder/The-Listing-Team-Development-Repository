name: Deploy Production Workers

# Production deploys are intentionally manual.
# Trigger from the Actions tab ("Run workflow") or via gh CLI:
#   gh workflow run deploy-production.yml
#
# Uses prod wrangler.toml configs (no -staging suffix) for each worker.
# All three workers deploy in parallel. If one fails, the others still run.

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "DEPLOY" to confirm production deploy'
        required: true
        default: ''

jobs:
  guard:
    name: Confirm production deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DEPLOY" ]; then
            echo "::error::Confirmation text must be 'DEPLOY' (got: '${{ github.event.inputs.confirm }}')"
            exit 1
          fi
          echo "Production deploy confirmed."

  deploy-proxy:
    name: Deploy thelistingteamproxy (prod)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: thelistingteamproxy
          command: deploy --config wrangler.toml

  deploy-support-tickets:
    name: Deploy tlt-support-tickets (prod)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: support-tickets
          command: deploy --config wrangler.toml

  deploy-brand-injector:
    name: Deploy ghl-brand-injector (prod)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          workingDirectory: ghl-brand-injector
          command: deploy --config wrangler.toml
